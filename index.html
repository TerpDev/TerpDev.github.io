<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Container</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col-sm">
        <div style="width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center;">
          <model-viewer style="width: 100%; height: 100%;" src="shared-assets/models/plannee.gltf" ar
            shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
        </div>
      </div>
      <div class="col-sm">
        <div style="width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center;">
          <model-viewer id="modelviewer1" style="width: 100%; height: 100%;" src="shared-assets/models/boom_2_.glb" ar
            ar-placement="wall" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
        </div>
      </div>
      <div class="col-sm">
        <div style="width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center;">
          <!--Input that you can put in an image and the image that you are uploading needs to stick to the plane-->

          <model-viewer id="modelviewer3" style="width: 100%; height: 100%;" src="shared-assets/models/plannee.gltf" ar
            ar-placement="wall" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
          <!--submit button that can put an image on the plane-->
          <form action="upload.php" method="post" enctype="multipart/form-data">
            Select image to upload:
            <input type="file" name="fileToUpload" id="fileToUpload">
            <input type="submit" value="Upload Image" name="submit">
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>

  </script>
</body>


</html>
